<!DOCTYPE html>
<html class="light" lang="es">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>ESCARLÚ - Atender Pedidos</title>

                    "surface-variant": "#e5e2e1",

                    "on-tertiary": "#ffffff",
                    "on-primary": "#ffffff",
                    "primary-container": "#c8a2c8",

                    "inverse-surface": "#313030",
                    "surface": "#fcf9f8",
                    "on-tertiary-fixed-variant": "#574500",
                    "on-background": "#1c1b1b",
                    "secondary-fixed": "#ffdad9",
                    "error-container": "#ffdad6",
                    "surface-bright": "#fcf9f8",
                    "on-error-container": "#93000a",
                    "secondary": "#7b5455",
                    "primary-fixed": "#ffd6fe",
                    "error": "#ba1a1a",
                    "on-secondary-container": "#7a5354",
                    "secondary-container": "#fecbcb",
                    "surface-container": "#f0eded",
                    "tertiary-container": "#cfaa32",

            "spacing": {

                    "stack-sm": "12px",

            },
            "fontFamily": {
                    "display-lg": ["Libre Caslon Text"],
                    "body-lg": ["\"Source Sans 3\""],
                    "label-md": ["\"Source Sans 3\""],
                    "label-lg": ["\"Source Sans 3\""],
                    "body-sm": ["\"Source Sans 3\""],
                    "body-md": ["\"Source Sans 3\""],

                    "headline-md": ["Libre Caslon Text"]
            },
            "fontSize": {
                    "display-lg": ["48px", {"lineHeight": "1.2", "fontWeight": "700"}],
                    "body-lg": ["20px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "label-md": ["16px", {"lineHeight": "1.2", "letterSpacing": "0.05em", "fontWeight": "700"}],
                    "label-lg": ["18px", {"lineHeight": "1.2", "letterSpacing": "0.02em", "fontWeight": "600"}],
                    "body-sm": ["16px", {"lineHeight": "1.5", "fontWeight": "400"}],
                    "body-md": ["18px", {"lineHeight": "1.6", "fontWeight": "400"}],
                    "headline-lg": ["32px", {"lineHeight": "1.3", "fontWeight": "600"}],
                    "headline-md": ["24px", {"lineHeight": "1.4", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
    <style>
        body {
            background-color: #FAFAFA;
            font-family: 'Source Sans 3', sans-serif;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .bento-card {
            background: #ffffff;
            box-shadow: 0px 4px 20px rgba(116, 84, 117, 0.08);
            border-top: 2px solid #c8a2c8;
        }
        /* POS constraints */
        html, body { height: 100vh; overflow: hidden; }
        main { height: 100vh; display: flex; flex-direction: column; overflow: hidden; padding: 12px !important; gap: 12px !important; }
    </style>
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col md:flex-row overflow-hidden">

<!-- SideNav (Cargado dinámicamente por shared.js) -->
<nav class="hidden md:flex flex-col h-screen fixed left-0 top-0 py-stack-md px-stack-sm bg-surface-container w-72 shadow-md z-20"></nav>

<!-- Main Content Area -->
<main class="flex-1 md:ml-72 flex flex-col gap-3 w-full max-w-[1280px] overflow-hidden">
    
    <!-- Unified Top Bar Header (Tienda) -->
    <header class="flex justify-between items-center w-full px-6 h-[60px] bg-white border-b border-outline-variant/30 shadow-sm sticky top-0 z-40 max-w-[1440px] mx-auto shrink-0">
      <!-- Lado Izquierdo: Badge de Sede -->
      <div class="flex items-center gap-2">
        <div class="flex items-center gap-1.5 bg-primary/10 px-3 py-1.5 rounded-full border border-primary/20">
          <span class="material-symbols-outlined text-primary text-xs" style="font-variation-settings: 'FILL' 1;">storefront</span>
          <span class="text-xs font-bold text-primary">Tienda Santa Lucía</span>
        </div>
      </div>

      <!-- Centro: Input de Búsqueda Global Centrado -->
      <div class="flex-1 max-w-md mx-6">
        <div class="relative w-full">
          <span class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-on-surface-variant">
            <span class="material-symbols-outlined text-sm">search</span>
          </span>
          <input type="text" placeholder="Buscar producto, modelo o SKU..." class="w-full pl-9 pr-4 py-1.5 border border-outline-variant bg-surface rounded-lg text-xs font-bold text-on-surface focus:outline-none focus:ring-1 focus:ring-primary h-9 outline-none" id="global-search-input" />
        </div>
      </div>

      <!-- Lado Derecho: Indicador y Usuario -->
      <div class="flex items-center gap-4">
        <div class="flex items-center gap-1.5 bg-green-500/10 px-3 py-1.5 rounded-full border border-green-500/20">
          <span class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></span>
          <span class="text-[11px] font-bold text-green-700">Caja Abierta</span>
        </div>
        <div class="flex items-center gap-2 pl-3 border-l border-outline-variant/50">
          <span class="text-xs font-bold text-on-surface">Vendedora - Santa Lucía</span>
          <div class="w-8 h-8 rounded-full overflow-hidden border border-outline-variant bg-surface-container shrink-0">
            <img alt="Vendedora Profile" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDs7Mrds1vimPvZHCWIO9GhQNAZ5u-TAIqAP3QMG5eKz7W76vMgthHRIgLDOaXGzXwnojPL_grWNYJlNc9SEioAzKfQ6OxOLCUuKHtXUkT6I3VWiui80O6QCT8OX11mfGj2ut7jS4H3KmJtsMgUz_Ykzx4CpK88WwpqV4asNB8gpY7I2P4JI5LfGQob1D8nVRcoRtp5njvMTx-I8utD5u9_io167GlwvjOS7nfB5MusZNmlaNvJEro"/>
          </div>
        </div>
      </div>
    </header>

    <!-- Page Header (Compact) -->
    <div class="flex items-center justify-between pb-1.5 border-b border-surface-variant shrink-0 mt-1">
        <div class="flex items-center gap-3">
            <h2 id="store-title-label" class="text-[1.4rem] font-bold text-primary font-sans leading-tight">Atender Pedidos</h2>
            <span class="text-xs text-on-surface-variant font-semibold">| Fecha: <span id="current-date-label">22 de Julio, 2026</span></span>
        </div>
        <div class="hidden">
            <span id="store-subtitle-label"></span>
        </div>
    </div>

    <!-- Bento Layout Content -->
    <div class="flex-grow grid grid-cols-1 lg:grid-cols-12 gap-3 min-h-0">
        <!-- Section: Pedidos Pendientes (lg:col-span-6) -->
        <div class="lg:col-span-6 bento-card p-4 rounded-xl flex flex-col min-h-0">
            <div class="flex items-center gap-2 mb-3 shrink-0">
                <span class="material-symbols-outlined text-primary text-xl">pending_actions</span>
                <h3 class="text-xs font-bold text-on-surface uppercase tracking-wider">Pedidos por Atender</h3>
            </div>
            
            <div id="pending-list-container" class="space-y-3 overflow-y-auto flex-1 max-h-[calc(100vh-210px)] pr-1">
                <!-- dynamic items here -->
            </div>
        </div>

        <!-- Section: Historial de Atendidos (lg:col-span-6) -->
        <div class="lg:col-span-6 bento-card p-4 rounded-xl flex flex-col min-h-0">
            <div class="flex items-center gap-2 mb-3 shrink-0">
                <span class="material-symbols-outlined text-primary text-xl">history</span>
                <h3 class="text-xs font-bold text-on-surface uppercase tracking-wider">Pedidos Atendidos</h3>
            </div>
            
            <div class="space-y-3 overflow-y-auto flex-1 max-h-[calc(100vh-210px)] pr-1" id="history-list-container">
                <!-- dynamic items here -->
            </div>
        </div>
    </div>
</main>

<script>
    const user = getCurrentUser();

    document.addEventListener("DOMContentLoaded", () => {
        checkAuth();
        renderSideNav("atenderpedidos");

        // Mostrar fecha actual
        const options = { day: 'numeric', month: 'long', year: 'numeric' };
        document.getElementById("current-date-label").textContent = new Date().toLocaleDateString('es-ES', options);

        renderIncomingRequests();
    });

    function renderIncomingRequests() {
        const pendingContainer = document.getElementById("pending-list-container");
        const historyContainer = document.getElementById("history-list-container");
        
        if (!pendingContainer || !historyContainer) return;

        const allReqs = JSON.parse(localStorage.getItem("escarlu_requests")) || [];
        const inventory = JSON.parse(localStorage.getItem("escarlu_inventory")) || {};

        // Filter requests where this store is the origin and type is transfer ('traspaso')
        const incoming = allReqs.filter(r => user && r.origin === user.storeId && r.type === "traspaso");

        // Sort by date descending
        incoming.sort((a, b) => new Date(b.date) - new Date(a.date));

        const pendingReqs = incoming.filter(r => r.status === "pendiente");
        const historicalReqs = incoming.filter(r => r.status !== "pendiente");

        // 1. Render Pending
        pendingContainer.innerHTML = "";
        if (pendingReqs.length === 0) {
            pendingContainer.innerHTML = `
                <div class="bento-card p-6 rounded-xl text-center shadow-md">
                    <p class="text-on-surface-variant font-medium text-lg">No tienes pedidos pendientes por atender.</p>
                </div>
            `;
        } else {
            pendingReqs.forEach(req => {
                const storeName = STORE_NAMES[req.destination] || req.destination;
                const modelLabel = MODEL_NAMES[req.model] || req.model;
                const colorLabel = COLOR_NAMES[req.color] || req.color;
                
                // Get active store stock
                const storeStock = inventory[user.storeId]?.[req.model]?.[req.color]?.[req.size] || 0;
                const hasEnoughStock = storeStock >= req.qty;

                const card = document.createElement("div");
                card.className = "bento-card p-6 rounded-xl border border-outline-variant/60 relative";
                
                let warningHtml = "";
                let disabledAttr = "";
                let opacityClass = "";

                if (!hasEnoughStock) {
                    warningHtml = `
                        <div class="mt-3 flex items-center gap-2 text-error bg-error-container/30 p-3 rounded-lg font-bold text-sm">
                            <span class="material-symbols-outlined text-lg">warning</span>
                            <span>Stock insuficiente en tu tienda (Solo tienes ${storeStock} disp.)</span>
                        </div>
                    `;
                    disabledAttr = "disabled";
                    opacityClass = "opacity-50 cursor-not-allowed";
                } else {
                    warningHtml = `
                        <div class="mt-3 text-xs text-on-surface-variant font-semibold bg-surface-container-low p-2 rounded">
                            Stock disponible en tienda: <strong class="text-primary">${storeStock} unidades</strong>
                        </div>
                    `;
                }

                card.innerHTML = `
                    <div class="flex items-center justify-between border-b border-outline-variant pb-3 mb-4">
                        <span class="font-bold text-sm text-primary uppercase tracking-wide">Solicitud: ${req.id}</span>
                        <span class="px-3 py-1 bg-secondary-container text-on-secondary-container rounded-full text-xs font-bold uppercase">${storeName}</span>
                    </div>
                    <div class="mb-4">
                        <p class="text-xs text-on-surface-variant font-bold mb-1">Solicita despacho de:</p>
                        <div class="flex items-center gap-4 bg-surface-container-low p-3.5 rounded-xl border border-outline-variant">
                            <div class="w-10 h-10 rounded bg-primary-container text-on-primary-container flex items-center justify-center font-bold text-sm shadow-sm">${req.size}</div>
                            <div class="flex-1">
                                <p class="font-bold text-sm text-on-surface">${modelLabel}</p>
                                <p class="text-xs text-on-surface-variant font-medium">${colorLabel} • Talla ${req.size}</p>
                            </div>
                            <div class="text-right">
                                <p class="text-2xl font-bold text-primary">${req.qty}</p>
                                <p class="text-[10px] text-on-surface-variant uppercase font-bold">Unids</p>
                            </div>
                        </div>
                        ${warningHtml}
                    </div>
                    <div class="flex gap-4">
                        <button onclick="approveRequest('${req.id}')" ${disabledAttr} class="flex-1 min-h-[50px] rounded-xl bg-green-600 text-white font-bold text-sm hover:bg-green-700 transition-colors flex items-center justify-center gap-2 shadow-sm ${opacityClass}">
                            <span class="material-symbols-outlined text-lg">check_circle</span>
                            Aceptar y Despachar
                        </button>
                        <button onclick="rejectRequest('${req.id}')" class="flex-1 min-h-[50px] rounded-xl bg-error text-on-error font-bold text-sm hover:brightness-95 transition-colors flex items-center justify-center gap-2 shadow-sm">
                            <span class="material-symbols-outlined text-lg">cancel</span>
                            Rechazar
                        </button>
                    </div>
                `;
                pendingContainer.appendChild(card);
            });
        }

        // 2. Render History
        historyContainer.innerHTML = "";
        if (historicalReqs.length === 0) {
            historyContainer.innerHTML = `
                <p class="text-xs text-on-surface-variant font-medium text-center py-4">No hay pedidos atendidos recientemente.</p>
            `;
        } else {
            historicalReqs.slice(0, 8).forEach(req => {
                const storeName = STORE_NAMES[req.destination] || req.destination;
                const modelLabel = MODEL_NAMES[req.model] || req.model;
                const colorLabel = COLOR_NAMES[req.color] || req.color;
                
                let badgeColor = 'bg-green-100 text-green-800';
                if (req.status === 'rechazado') {
                    badgeColor = 'bg-red-100 text-red-800';
                }

                const div = document.createElement("div");
                div.className = "flex items-center justify-between p-3.5 bg-surface-container-low rounded-xl border border-outline-variant hover:bg-surface-container-high transition-colors";
                div.innerHTML = `
                    <div class="flex items-center gap-3">
                        <div class="w-9 h-9 rounded bg-primary-container text-on-primary-container flex items-center justify-center font-bold text-sm shadow-sm">${req.size}</div>
                        <div>
                            <p class="font-bold text-xs text-on-surface">${modelLabel} - ${colorLabel}</p>
                            <p class="text-[10px] text-on-surface-variant font-medium">Hacia: ${storeName} • Cant: ${req.qty} • ${req.id}</p>
                        </div>
                    </div>
                    <span class="px-2 py-0.5 ${badgeColor} rounded font-bold text-[10px] uppercase">${req.status}</span>
                `;
                historyContainer.appendChild(div);
            });
        }
    }

    function approveRequest(reqId) {
        const allReqs = JSON.parse(localStorage.getItem("escarlu_requests")) || [];
        const inventory = JSON.parse(localStorage.getItem("escarlu_inventory")) || {};
        
        const reqIdx = allReqs.findIndex(r => r.id === reqId);
        if (reqIdx === -1) return;

        const req = allReqs[reqIdx];

        // Deduct from origin (this store)
        const originStock = inventory[req.origin]?.[req.model]?.[req.color]?.[req.size] || 0;
        if (originStock < req.qty) {
            alert("No tienes suficiente stock en tienda para completar esta transferencia.");
            return;
        }

        inventory[req.origin][req.model][req.color][req.size] = originStock - req.qty;

        // Add to destination
        if (!inventory[req.destination]) inventory[req.destination] = {};
        if (!inventory[req.destination][req.model]) inventory[req.destination][req.model] = {};
        if (!inventory[req.destination][req.model][req.color]) inventory[req.destination][req.model][req.color] = {};
        
        const destStock = inventory[req.destination][req.model][req.color][req.size] || 0;
        inventory[req.destination][req.model][req.color][req.size] = destStock + req.qty;

        // Save inventory
        localStorage.setItem("escarlu_inventory", JSON.stringify(inventory));

        // Update request status
        allReqs[reqIdx].status = "aprobado";
        localStorage.setItem("escarlu_requests", JSON.stringify(allReqs));

        alert("¡Pedido despachado correctamente y stock actualizado!");
        renderIncomingRequests();
    }

    function rejectRequest(reqId) {
        if (!confirm("¿Está seguro de que desea rechazar este pedido?")) return;

        const allReqs = JSON.parse(localStorage.getItem("escarlu_requests")) || [];
        const reqIdx = allReqs.findIndex(r => r.id === reqId);
        if (reqIdx === -1) return;

        allReqs[reqIdx].status = "rechazado";
        localStorage.setItem("escarlu_requests", JSON.stringify(allReqs));

        alert("Pedido rechazado.");
        renderIncomingRequests();
    }

    // Listen to storage event
    window.addEventListener('storage', (e) => {
        if (!e.key || e.key === 'escarlu_requests' || e.key === 'escarlu_inventory') {
            renderIncomingRequests();
        }
    });
</script>
</body>
</html>
