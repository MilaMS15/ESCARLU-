<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center p-container-padding antialiased">
<!-- Main Container -->
<main class="w-full max-w-[600px] mx-auto bg-surface-container-lowest rounded-xl shadow-lilac-soft border-t-2 border-primary-container p-stack-lg md:p-[64px] flex flex-col gap-stack-lg">
<!-- Header / Logo -->
<header class="text-center flex flex-col items-center gap-stack-sm">
<h1 class="font-display-lg text-display-lg text-primary tracking-tight">ESCARLÚ</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant">Acceso al Sistema de Gestión</p>
</header>
<!-- Login Form -->
<form action="#" class="flex flex-col gap-stack-md" method="POST">
<!-- Email Field -->
<div class="flex flex-col gap-unit">
<label class="font-label-lg text-label-lg text-on-surface flex items-center gap-2" for="email">
<span aria-hidden="true" class="material-symbols-outlined text-outline">mail</span>
                    Correo electrónico
                </label>
<input aria-required="true" class="h-[56px] w-full px-4 rounded-lg border-2 border-outline-variant bg-surface-bright font-body-lg text-body-lg text-on-surface placeholder-outline focus:border-primary-container focus:ring-4 focus:ring-primary-container/30 transition-shadow outline-none" id="email" name="email" placeholder="ejemplo@correo.com" required="" type="email"/>
</div>
<!-- Password Field -->
<div class="flex flex-col gap-unit">
<label class="font-label-lg text-label-lg text-on-surface flex items-center gap-2" for="password">
<span aria-hidden="true" class="material-symbols-outlined text-outline">lock</span>
                    Contraseña
                </label>
<input aria-required="true" class="h-[56px] w-full px-4 rounded-lg border-2 border-outline-variant bg-surface-bright font-body-lg text-body-lg text-on-surface placeholder-outline focus:border-primary-container focus:ring-4 focus:ring-primary-container/30 transition-shadow outline-none" id="password" name="password" placeholder="Ingrese su contraseña" required="" type="password"/>
</div>
<!-- Forgot Password Link -->
<div class="flex justify-end pt-unit">
<a class="font-body-lg text-body-lg text-primary font-semibold hover:text-on-primary-container hover:underline underline-offset-4 decoration-2 transition-colors focus:outline-none focus:ring-4 focus:ring-primary-container/30 rounded" href="#">
                    ¿Olvidó su contraseña?
                </a>
</div>
<!-- Primary Action -->
<button class="mt-stack-sm h-[56px] w-full bg-primary-container text-on-primary font-label-lg text-label-lg font-bold rounded-lg hover:bg-on-primary-container transition-colors duration-200 focus:outline-none focus:ring-4 focus:ring-primary-container/50 shadow-sm flex items-center justify-center gap-2" type="submit">
                Iniciar Sesión
                <span aria-hidden="true" class="material-symbols-outlined">login</span>
</button>
</form>
<!-- Divider -->
<div class="relative flex items-center py-stack-sm">
<div class="flex-grow border-t border-outline-variant"></div>
<span class="flex-shrink-0 mx-4 font-body-md text-body-md text-on-surface-variant">o si es un nuevo usuario</span>
<div class="flex-grow border-t border-outline-variant"></div>
</div>
<!-- Secondary Action -->
<div class="flex flex-col">
<a class="h-[56px] w-full border-2 border-primary-container text-on-surface font-label-lg text-label-lg rounded-lg hover:bg-surface-container-low transition-colors duration-200 focus:outline-none focus:ring-4 focus:ring-primary-container/30 flex items-center justify-center gap-2" href="#">
                Registrarse
                <span aria-hidden="true" class="material-symbols-outlined">person_add</span>
</a>
</div>
